name: Build Android APK from ZIP

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Unzip Project Files Automatically
      run: |
        unzip -o *.zip -d .
        if [ ! -f "build.gradle.kts" ] && [ ! -f "build.gradle" ]; then
          echo "Looking for project files in subdirectories..."
          SUBDIR=$(find . -maxdepth 2 -name "app" -type d -exec dirname {} \;)
          if [ "$SUBDIR" != "." ] && [ ! -z "$SUBDIR" ]; then
            mv $SUBDIR/* . 2>/dev/null || true
          fi
        fi

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Fix Repositories and Injection (403 Error Fix)
      run: |
        # إصلاح وتأكيد وجود مستودعات جوجل في كل ملفات build.gradle و settings.gradle
        find . -name "build.gradle" -o -name "settings.gradle" | while read file; do
          sed -i 's/jcenter()/google()\n        mavenCentral()/g' "$file"
        done

    - name: Fix Missing Keystore Error Automatically
      run: |
        mkdir -p app/src/debug app/
        keytool -genkey -v -keystore app/src/debug/debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

    - name: Auto-Create Mock google-services.json
      run: |
        JSON_CONTENT='{"project_info":{"project_number":"123456789","project_id":"mock-id","storage_bucket":"mock.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:123456:android:1234","android_client_info":{"package_name":"'$(grep -r "applicationId" app/build.gradle 2>/dev/null | awk -F '"' '{print $2}' | head -n 1 || echo "com.example.app")'"}},"api_key":[{"current_key":"mock_key"}],"services":{"appinvite_service":{"status":1}}}]}'
        find . -name "app" -type d | while read dir; do
          echo "$JSON_CONTENT" > "$dir/google-services.json"
        done

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: My-Pharmacy-App
        path: app/build/outputs/apk/debug/*.apk
